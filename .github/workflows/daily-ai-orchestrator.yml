name: Daily AI Orchestration (GetResponse)

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

jobs:
  run-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run main orchestrator
        run: node orchestrator.js

      - name: Run repair orchestrator
        run: node repair-orchestrator.js
